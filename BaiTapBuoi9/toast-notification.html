<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Toast Notification</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 40px;
            background: #f5f5f5;
        }

        #toast-toggle {
            display: none;
        }

        .open-btn {
            padding: 14px 28px;
            background: #222;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
        }

        .toast {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: #4caf50;
            color: #fff;
            padding: 14px 20px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            margin-left: 20px;
            visibility: hidden;
            opacity: 0;
        }

        .close-btn {
            background: #388e3c;
            color: #fff;
            border: none;
            border-radius: 4px;
            width: 28px;
            height: 28px;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        #toast-toggle:checked ~ .toast {
            visibility: visible;
            opacity: 1;
        }
    </style>
</head>
<body>
<input type="checkbox" id="toast-toggle">
<label class="open-btn" for="toast-toggle">Hiện thông báo</label>
<div class="toast">Lưu thành công!
    <label class="close-btn" for="toast-toggle">×</label>
</div>

</body>
</html>
