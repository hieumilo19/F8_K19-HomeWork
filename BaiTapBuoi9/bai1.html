<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>BaiTapBuoi9 - Bai1</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 30px;
        }

        h2 {
            font-size: 18px;
            margin-bottom: 20px;
        }

        .row {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            gap: 30px;
            margin-bottom: 30px;
        }

        .item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .item span {
            font-size: 12px;
            color: #333;
        }

        .hinh-vuong {
            width: 60px;
            height: 60px;
            border: 3px solid #e74c3c;
            background: transparent;
        }

        .hinh-chu-nhat {
            width: 90px;
            height: 55px;
            border: 3px solid #5dade2;
            background: transparent;
        }

        .tam-giac-len {
            width: 0;
            height: 0;
            border-left: 40px solid transparent;
            border-right: 40px solid transparent;
            border-bottom: 70px solid #27ae60;
        }

        .tam-giac-xuong {
            width: 0;
            height: 0;
            border-left: 40px solid transparent;
            border-right: 40px solid transparent;
            border-top: 70px solid #e67e22;
        }

        .tam-giac-trai {
            width: 0;
            height: 0;
            border-top: 40px solid transparent;
            border-bottom: 40px solid transparent;
            border-right: 70px solid #8e44ad;
        }

        .tam-giac-phai {
            width: 0;
            height: 0;
            border-top: 40px solid transparent;
            border-bottom: 40px solid transparent;
            border-left: 70px solid #e67e22;
        }

        .hinh-thang {
            width: 60px;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-bottom: 55px solid #1abc9c;
        }

        .tam-giac-rong {
            width: 0;
            height: 0;
            border-left: 60px solid transparent;
            border-right: 60px solid transparent;
            border-bottom: 45px solid #2c3e50;
        }

        .tam-giac-nhon {
            width: 0;
            height: 0;
            border-left: 25px solid transparent;
            border-right: 25px solid transparent;
            border-bottom: 80px solid #e74c3c;
        }

        .tam-giac-can {
            width: 0;
            height: 0;
            border-left: 35px solid transparent;
            border-right: 35px solid transparent;
            border-bottom: 60px solid #e67e22;
        }

        .mui-ten-phai {
            width: 0;
            height: 0;
            border-top: 25px solid transparent;
            border-bottom: 25px solid transparent;
            border-left: 50px solid #27ae60;
        }

        .mui-ten-trai {
            width: 0;
            height: 0;
            border-top: 25px solid transparent;
            border-bottom: 25px solid transparent;
            border-right: 50px solid #8e44ad;
        }

        .ribbon {
            width: 0;
            height: 0;
            border-top: 25px solid #e74c3c;
            border-bottom: 25px solid #e74c3c;
            border-left: 70px solid #e74c3c;
            border-right: 20px solid transparent;
        }

        .f8 {
            display: inline-block;
            margin-top: 10px;
        }

        .letter-F {
            display: inline-block;
            width: 70px;
            height: 130px;
            border-top: 20px solid #e74c3c;
            border-left: 20px solid #e74c3c;
            border-bottom: 0px ;
            border-right: 0;
            position: relative;
            margin-right: 15px;
        }

        .letter-F::before {
            content: '';
            display: block;
            width: 90px;
            height: 0;
            border-top: 20px solid #e74c3c;
            position: absolute;
            top: 40px;
            left: -20px;
        }

        .letter-8 {
            display: inline-block;
            width: 70px;
            height: 110px;
            border: 20px solid #e74c3c;
            position: relative;
        }

        .letter-8::before {
            content: '';
            display: block;
            position: absolute;
            top: 50%;
            left: -20px;
            width: calc(100% + 40px);
            margin-top: -10px;
            border-top: 20px solid #e74c3c;
        }
    </style>
</head>
<body>
    <div class="row">
        <div class="item">
            <div class="hinh-vuong"></div>
            <span>1. Hình vuông</span>
        </div>

        <div class="item">
            <div class="hinh-chu-nhat"></div>
            <span>2. Hình chữ nhật</span>
        </div>

        <div class="item">
            <div class="tam-giac-len"></div>
            <span>3. Tam giác lên</span>
        </div>

        <div class="item">
            <div class="tam-giac-xuong"></div>
            <span>4. Tam giác xuống</span>
        </div>

        <div class="item">
            <div class="tam-giac-trai"></div>
            <span>5. Tam giác trái</span>
        </div>

        <div class="item">
            <div class="tam-giac-phai"></div>
            <span>6. Tam giác phải</span>
        </div>

        <div class="item">
            <div class="hinh-thang"></div>
            <span>7. Hình thang</span>
        </div>
    </div>

    <div class="row">
        <div class="item">
            <div class="tam-giac-rong"></div>
            <span>8. Tam giác rộng</span>
        </div>

        <div class="item">
            <div class="tam-giac-nhon"></div>
            <span>9. Tam giác nhọn</span>
        </div>

        <div class="item">
            <div class="tam-giac-can"></div>
            <span>10. Tam giác cân</span>
        </div>

        <div class="item">
            <div class="mui-ten-phai"></div>
            <span>11. Mũi tên phải</span>
        </div>

        <div class="item">
            <div class="mui-ten-trai"></div>
            <span>12. Mũi tên trái</span>
        </div>

        <div class="item">
            <div class="ribbon"></div>
            <span>13. Ribbon/Lá cờ</span>
        </div>
    </div>

    <div class="row">
        <div class="item">
            <div class="f8">
                <div class="letter-F"></div>
                <div class="letter-8"></div>
            </div>
            <span>14. F8</span>
        </div>
    </div>

</div>

</body>
</html>
