<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Đăng Ký Thành Viên</title>
</head>
<body>

<h1>Form Đăng Ký Thành Viên</h1>

<form
        action="https://api-gateway.f8.edu.vn/action_page.php"
        method="post"
        enctype="multipart/form-data"
>

    <fieldset>
        <legend>Nhóm 1 – Thông tin cơ bản</legend>

        <div>
            <label for="fullname">Họ và tên</label><br>
            <input
                    type="text"
                    id="fullname"
                    name="fullname"
                    placeholder="Nguyễn Văn A"
                    required
                    autofocus
                    tabindex="1"
            >
        </div><br>

        <div>
            <label for="email">Email</label><br>
            <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="example@gmail.com"
                    required
                    tabindex="2"
            >
        </div><br>

        <div>
            <label for="password">Mật khẩu</label><br>
            <input
                    type="password"
                    id="password"
                    name="password"
                    required
                    minlength="6"
                    autocomplete="off"
                    placeholder="Tối thiểu 6 ký tự"
                    tabindex="3"
            >
        </div><br>

        <div>
            <label for="confirm_password">Nhập lại mật khẩu</label><br>
            <input
                    type="password"
                    id="confirm_password"
                    name="confirm_password"
                    required
                    autocomplete="off"
                    placeholder="Nhập lại mật khẩu"
                    tabindex="4"
            >
        </div><br>

        <div>
            <label for="phone">Số điện thoại</label><br>
            <input
                    type="tel"
                    id="phone"
                    name="phone"
                    placeholder="0xxxxxxxxx"
                    pattern="0[0-9]{9}"
                    tabindex="5"
            >
        </div><br>

        <div>
            <label for="birthday">Ngày sinh</label><br>
            <input
                    type="date"
                    id="birthday"
                    name="birthday"
                    required
                    tabindex="6"
            >
        </div><br>

        <div>
            <label for="age">Tuổi</label><br>
            <input
                    type="number"
                    id="age"
                    name="age"
                    min="1"
                    max="120"
                    placeholder="Nhập tuổi của bạn"
                    tabindex="7"
            >
        </div><br>

        <div>
            <label for="website">Website cá nhân</label><br>
            <input
                    type="url"
                    id="website"
                    name="website"
                    placeholder="https://..."
                    tabindex="8"
            >
        </div><br>

        <div>
            <label for="address">Địa chỉ</label><br>
            <input
                    type="text"
                    id="address"
                    name="address"
                    placeholder="Số nhà, đường, phường/xã"
                    tabindex="9"
            >
        </div><br>

        <div>
            <label for="zipcode">Mã bưu chính</label><br>
            <input
                    type="text"
                    id="zipcode"
                    name="zipcode"
                    maxlength="6"
                    placeholder="700000"
                    tabindex="10"
            >
        </div><br>

    </fieldset>

    <br>

    <fieldset>
        <legend>Nhóm 2 – Thông tin bổ sung</legend>

        <div>
            <label>Giới tính <span>(required)</span></label><br>
            <input type="radio" id="gender_male" name="gender" value="Nam" required tabindex="11">
            <label for="gender_male">Nam</label>
            <input type="radio" id="gender_female" name="gender" value="Nữ" tabindex="12">
            <label for="gender_female">Nữ</label>
            <input type="radio" id="gender_other" name="gender" value="Khác" tabindex="13">
            <label for="gender_other">Khác</label>
        </div><br>

        <div>
            <label>Sở thích</label><br>
            <input type="checkbox" id="hobby_read" name="hobby" value="Đọc sách" tabindex="14">
            <label for="hobby_read">Đọc sách</label>
            <input type="checkbox" id="hobby_music" name="hobby" value="Nghe nhạc" tabindex="15">
            <label for="hobby_music">Nghe nhạc</label>
            <input type="checkbox" id="hobby_travel" name="hobby" value="Du lịch" tabindex="16">
            <label for="hobby_travel">Du lịch</label>
            <input type="checkbox" id="hobby_code" name="hobby" value="Lập trình" tabindex="17">
            <label for="hobby_code">Lập trình</label>
            <input type="checkbox" id="hobby_cook" name="hobby" value="Nấu ăn" tabindex="18">
            <label for="hobby_cook">Nấu ăn</label>
            <input type="checkbox" id="hobby_sport" name="hobby" value="Thể thao" tabindex="19">
            <label for="hobby_sport">Thể thao</label>
        </div><br>

        <div>
            <label for="education">Trình độ học vấn</label><br>
            <select id="education" name="education" tabindex="20">
                <option value="">-- Chọn trình độ --</option>
                <option value="Trung học">Trung học</option>
                <option value="Cao đẳng">Cao đẳng</option>
                <option value="Đại học">Đại học</option>
                <option value="Sau đại học">Sau đại học</option>
            </select>
        </div><br>

        <div>
            <label for="city">Tỉnh / Thành phố (chọn ít nhất 5)</label><br>
            <select id="city" name="city" multiple size="8" tabindex="21">
                <option value="Hà Nội">Hà Nội</option>
                <option value="TP. Hồ Chí Minh">TP. Hồ Chí Minh</option>
                <option value="Đà Nẵng">Đà Nẵng</option>
                <option value="Hải Phòng">Hải Phòng</option>
                <option value="Cần Thơ">Cần Thơ</option>
                <option value="Bình Dương">Bình Dương</option>
                <option value="Đồng Nai">Đồng Nai</option>
                <option value="An Giang">An Giang</option>
                <option value="Khánh Hoà">Khánh Hoà</option>
                <option value="Huế">Huế</option>
            </select>
        </div><br>

        <div>
            <label for="job">Nghề nghiệp</label><br>
            <select id="job" name="job" tabindex="22">
                <option value="">-- Chọn nghề nghiệp --</option>
                <option value="Học sinh">Học sinh</option>
                <option value="Sinh viên">Sinh viên</option>
                <option value="Nhân viên văn phòng">Nhân viên văn phòng</option>
                <option value="Lập trình viên">Lập trình viên</option>
                <option value="Khác">Khác</option>
            </select>
        </div><br>

        <div>
            <label>Khoá học quan tâm</label><br>
            <input type="checkbox" id="course_html" name="course" value="HTML-CSS" tabindex="23">
            <label for="course_html">HTML-CSS</label>
            <input type="checkbox" id="course_js" name="course" value="JavaScript" tabindex="24">
            <label for="course_js">JavaScript</label>
            <input type="checkbox" id="course_react" name="course" value="ReactJS" tabindex="25">
            <label for="course_react">ReactJS</label>
            <input type="checkbox" id="course_node" name="course" value="NodeJS" tabindex="26">
            <label for="course_node">NodeJS</label>
            <input type="checkbox" id="course_python" name="course" value="Python" tabindex="27">
            <label for="course_python">Python</label>
        </div><br>

        <div>
            <label>Hình thức học</label><br>
            <input type="radio" id="study_online" name="study_type" value="Online" tabindex="28">
            <label for="study_online">Online</label>
            <input type="radio" id="study_offline" name="study_type" value="Offline" tabindex="29">
            <label for="study_offline">Offline</label>
        </div><br>

        <div>
            <label for="bio">Giới thiệu bản thân</label><br>
            <textarea
                    id="bio"
                    name="bio"
                    rows="4"
                    placeholder="Viết vài dòng về bản thân..."
                    tabindex="30"
            ></textarea>
        </div><br>

        <div>
            <label for="avatar">Ảnh đại diện</label><br>
            <input
                    type="file"
                    id="avatar"
                    name="avatar"
                    accept=".jpg,.png"
                    tabindex="31"
            >
        </div><br>

        <div>
            <label for="cv">CV / Hồ sơ</label><br>
            <input
                    type="file"
                    id="cv"
                    name="cv"
                    accept=".pdf,.doc,.docx"
                    tabindex="32"
            >
        </div>

    </fieldset>

    <br>

    <fieldset>
        <legend>Nhóm 3 – Input đặc biệt</legend>

        <div>
            <label for="fav_color">Màu yêu thích</label><br>
            <input
                    type="color"
                    id="fav_color"
                    name="fav_color"
                    value="#ff6600"
                    tabindex="33"
            >
        </div><br>

        <div>
            <label for="satisfaction">Mức độ hài lòng (0–10)</label><br>
            <input
                    type="range"
                    id="satisfaction"
                    name="satisfaction"
                    min="0"
                    max="10"
                    value="5"
                    tabindex="34"
            >
        </div><br>

        <div>
            <label for="study_time">Giờ học trong ngày</label><br>
            <input
                    type="time"
                    id="study_time"
                    name="study_time"
                    tabindex="35"
            >
        </div><br>

        <div>
            <label for="start_month">Tháng bắt đầu học</label><br>
            <input
                    type="month"
                    id="start_month"
                    name="start_month"
                    tabindex="36"
            >
        </div><br>

        <div>
            <label for="start_week">Tuần bắt đầu học</label><br>
            <input
                    type="week"
                    id="start_week"
                    name="start_week"
                    tabindex="37"
            >
        </div><br>

        <div>
            <label for="register_at">Ngày &amp; giờ đăng ký</label><br>
            <input
                    type="datetime-local"
                    id="register_at"
                    name="register_at"
                    tabindex="38"
            >
        </div><br>

        <div>
            <label for="search_course">Tìm kiếm khoá học</label><br>
            <input
                    type="search"
                    id="search_course"
                    name="search_course"
                    placeholder="Nhập tên khoá học..."
                    tabindex="39"
            >
        </div><br>

        <div>
            <label for="experience">Số năm kinh nghiệm</label><br>
            <input
                    type="number"
                    id="experience"
                    name="experience"
                    min="0"
                    max="50"
                    step="1"
                    placeholder="Nhập số năm kinh nghiệm"
                    tabindex="40"
            >
        </div><br>

        <div>
            <label for="budget">Mức học phí mong muốn</label><br>
            <input
                    type="range"
                    id="budget"
                    name="budget"
                    min="0"
                    max="5000000"
                    step="100000"
                    value="1000000"
                    tabindex="41"
            >
        </div><br>

        <div>
            <label for="fav_lang">Ngôn ngữ lập trình yêu thích</label><br>
            <input
                    type="text"
                    id="fav_lang"
                    name="fav_lang"
                    placeholder="VD: JavaScript, Python..."
                    tabindex="42"
            >
        </div><br>

        <div>
            <label for="default_course">Mã khoá học mặc định (readonly)</label><br>
            <input
                    type="text"
                    id="default_course"
                    name="default_course"
                    value="F8_DEFAULT_2024"
                    readonly
                    tabindex="43"
            >

        </div><br>

        <div>
            <label for="promo_code">Mã khuyến mãi (disabled )</label><br>
            <input
                    type="text"
                    id="promo_code"
                    name="promo_code"
                    value=""
                    placeholder="Chưa có chương trình khuyến mãi"
                    disabled
                    tabindex="44"
            >

        </div>

    </fieldset>

    <br>

    <fieldset>
        <legend>Nhóm 4 – Xác nhận &amp; điều khoản</legend>

        <div>
            <input
                    type="checkbox"
                    id="agree_terms"
                    name="agree_terms"
                    value="1"
                    required
                    tabindex="45"
            >
            <label for="agree_terms">Tôi đồng ý với điều khoản sử dụng (required)</label>
        </div><br>

        <div>
            <input
                    type="checkbox"
                    id="subscribe"
                    name="subscribe"
                    value="1"
                    tabindex="46"
            >
            <label for="subscribe">Nhận thông báo qua email</label>
        </div><br>

        <div>
            <input
                    type="checkbox"
                    id="sms_notify"
                    name="sms_notify"
                    value="1"
                    tabindex="47"
            >
            <label for="sms_notify">Nhận thông báo qua SMS</label>
        </div><br>

        <div>
            <label for="ref_code">Mã giới thiệu</label><br>
            <input
                    type="text"
                    id="ref_code"
                    name="ref_code"
                    placeholder="Nhập mã nếu có"
                    tabindex="48"
            >
        </div><br>

        <input type="hidden" id="course_id" name="course_id" value="F8_2024">

        <input type="hidden" id="utm_source" name="utm_source" value="website">

    </fieldset>

    <br>

    <input type="submit" value="Đăng ký ngay" tabindex="49">

    <input type="reset" value="Nhập lại" tabindex="50">

</form>

</body>
</html>
