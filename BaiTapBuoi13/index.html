<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strips Hover Effect</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

    <div class="strip strip--relax">
        <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=800&h=600&fit=crop" alt="Relax" class="strip__img">
        <div class="strip__overlay"></div>
        <h2 class="strip__title">Relax</h2>
    </div>

    <div class="strip strip--explore">
        <img src="https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=800&h=600&fit=crop" alt="Explore" class="strip__img">
        <div class="strip__overlay"></div>
        <h2 class="strip__title">Explore</h2>
    </div>

    <div class="strip strip--travel">
        <img src="https://images.unsplash.com/photo-1523906834658-6e24ef2386f9?w=800&h=600&fit=crop" alt="Travel" class="strip__img">
        <div class="strip__overlay"></div>
        <h2 class="strip__title">Travel</h2>
    </div>

    <div class="strip strip--achieve">
        <img src="https://images.unsplash.com/photo-1484589065579-248aad0d8b13?w=800&h=600&fit=crop" alt="Achieve" class="strip__img">
        <div class="strip__overlay"></div>
        <h2 class="strip__title">Achieve</h2>
    </div>

    <div class="strip strip--dare">
        <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&h=600&fit=crop" alt="Dare" class="strip__img">
        <div class="strip__overlay"></div>
        <h2 class="strip__title">Dare</h2>
    </div>

</div>
</body>
</html>
